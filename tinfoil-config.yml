cvm-version: 0.7.1
cpus: 16
gpus: 1
memory: 65536

containers:
  - name: "ml-embeddings"
    image: "us-central1-docker.pkg.dev/workshop-labs-pbc/pollux-docker/ml-embeddings@sha256:e34006d6b5cbd24b3e4558b6c04961190b6b89a07ea23bfcd326703f3bd3bd13"
    runtime: nvidia
    gpus: all
    ipc: host
    cap_add:
      - SYS_ADMIN
    devices:
      - /dev/fuse
    security_opt:
      - apparmor=unconfined
    volumes:
      - /mnt/ramdisk/gcloud_key.json:/key.json:ro
    env:
      - GOOGLE_APPLICATION_CREDENTIALS: "/key.json"
      - GCS_BUCKET: "pollux-enc-prod"
      - POLLUX_LN_GCS_BUCKET: "gs://pollux-enc-prod"
      - KEY_MODE: "real_keys"
    secrets:
      - DATABASE_URL
      - GOOGLE_CLIENT_ID
      - GOOGLE_CLIENT_SECRET
      - TINFOIL_API_KEY
      - HF_TOKEN
      - INTERNAL_SERVICE_SECRET
    command:
      - "--prod"

shim:
  upstream-port: 8000
  paths:
    - /ping
    - /set_dek
    - /v1/search
    - /v1/file/{file_id}
    - /v1/db/users
    - /v1/db/files
    - /v1/metrics
    - /v1/stats
    - /v1/user/*
